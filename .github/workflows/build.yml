name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install openpyxl pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed --name="兰湘子汇总工具" merge_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 兰湘子汇总工具-Windows
          path: dist/兰湘子汇总工具.exe